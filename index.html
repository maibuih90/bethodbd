<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chặn anh</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        h1 {
            font-size: 70px;
            color: #bbb;
            text-align: center;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #888,
                0 0 20px #444;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                opacity: 1;
            }
            20%, 24%, 55% {
                opacity: 0.3;
            }
        }

        /* hiệu ứng sương mờ nhẹ */
        body::after {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.02),
                rgba(255,255,255,0.02) 1px,
                transparent 1px,
                transparent 3px
            );
            animation: move 10s linear infinite;
        }

        @keyframes move {
            from { transform: translateY(0); }
            to { transform: translateY(-50px); }
        }
    </style>
</head>
<body>
    <h1>EM SẼ PHẢI HỐI HẬN</h1>
</body>
</html>
