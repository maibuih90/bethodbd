<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Cảnh báo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, red, orange, yellow, purple);
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
        }

        h1 {
            font-size: 60px;
            color: white;
            text-align: center;
            font-weight: bold;
            text-shadow: 4px 4px 10px black;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
    </style>
</head>
<body>
    <h1>EM SẼ PHẢI HỐI HẬN</h1>
</body>
</html>
